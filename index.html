<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Zarar's Classes - modern Class 10 Mathematics and Science notes website."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Zarar's Classes</title>
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('zarar-classes-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
